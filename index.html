<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка из Figma</title>
  <style>
    @font-face {
      font-family: "TT Norms Tochka Extended";
      src: url("./Fonts 2/TT-Norms-Tochka-Extended/TT Norms Tochka Extended/OTF/TT-Norms-OTF/TT Norms Tochka Extended DemiBold.otf") format("opentype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    :root {
      --bg-page: #e8e8eb;
      --text-dark: #191919;
      --white: #ffffff;
      --radius-card: 32px;
      --radius-image: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-page);
      font-family: "TT Norms Tochka Extended", Arial, sans-serif;
      padding: 32px;
      display: grid;
      place-items: center;
    }

    .card {
      width: 520px;
      height: 700px;
      border: 3px solid var(--text-dark);
      background: var(--white);
      color: var(--text-dark);
      border-radius: var(--radius-card);
      padding: 63px 16px 16px;
      position: relative;
      transition: background-color 220ms ease, color 220ms ease, border-color 220ms ease;
    }

    .card:hover {
      border: 3px solid #000000;
      background: #000000;
      color: var(--white);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 39px;
    }

    .card-title {
      width: 384px;
      margin: 0;
      font-size: 30px;
      line-height: 36px;
      letter-spacing: -0.3px;
      font-weight: 600;
    }

    .card-action {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #191919;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background-color 220ms ease;
    }

    .card:hover .card-action {
      background: #ffffff;
    }

    .card-image-wrap {
      width: 488px;
      height: 467px;
      border-radius: var(--radius-image);
      overflow: hidden;
      position: relative;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .icon-arrow {
      width: 14px;
      height: 14px;
      display: block;
    }

    .icon-arrow-dark {
      display: none;
    }

    .card:hover .icon-arrow-light {
      display: none;
    }

    .card:hover .icon-arrow-dark {
      display: block;
    }

    @media (max-width: 620px) {
      body {
        padding: 16px;
      }

      .card {
        width: min(520px, 100%);
        height: auto;
        padding: 40px 20px 20px;
      }

      .card-title {
        width: auto;
        font-size: 36px;
      }

      .card-image-wrap {
        width: 100%;
        aspect-ratio: 488 / 467;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <article class="card">
    <header class="card-header">
      <h1 class="card-title">AI-генератор:<br>быстрое создание сайта, логотипа и изображений</h1>
      <span class="card-action" aria-hidden="true">
        <img
          class="icon-arrow icon-arrow-light"
          src="https://www.figma.com/api/mcp/asset/e7240698-e9c8-406a-936d-dc61c8ab567a"
          alt=""
        >
        <img
          class="icon-arrow icon-arrow-dark"
          src="https://www.figma.com/api/mcp/asset/0be698ca-e4a6-4bb2-9fdc-c22c6e859654"
          alt=""
        >
      </span>
    </header>
    <div class="card-image-wrap">
      <img
        class="card-image"
        src="https://www.figma.com/api/mcp/asset/1a6a54d1-1376-4bae-af75-f62464ea98d8"
        alt="Два человека с телефоном и декоративными фиолетовыми элементами"
      >
    </div>
  </article>
</body>
</html>
