<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карусель — как в Figma</title>
  <style>
    @font-face {
      font-family: "TT Norms Tochka Extended";
      src: url("./Fonts 2/TT-Norms-Tochka-Extended/TT Norms Tochka Extended/OTF/TT-Norms-OTF/TT Norms Tochka Extended DemiBold.otf") format("opentype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    @font-face {
      font-family: "Tochka Script";
      src: url("./Fonts 2/Tochka-Script/Tochka Script/OTF/Tochka Script OpenType 1-000/Tochka Script.otf") format("opentype");
      font-style: normal;
      font-weight: 400;
      font-display: swap;
    }

    :root {
      --bg-page: #e8e8eb;
      --text-dark: #191919;
      --white: #ffffff;
      --radius-card: 32px;
      --radius-image: 16px;
      --carousel-ease: cubic-bezier(0.4, 0, 0.2, 1);
      --carousel-duration: 480ms;
      --carousel-gap: 20px;
      --carousel-card-width: min(480px, 86vw);
      --card-fixed-height: 700px;
      --card-title-block-height: 7.5rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-page);
      font-family: "TT Norms Tochka Extended", Arial, sans-serif;
      padding: 40px 0 48px;
      color: var(--text-dark);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* —— Секция —— */
    .carousel-section {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .carousel-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .section-title__script {
      font-family: "Tochka Script", cursive;
      font-weight: 400;
      font-size: clamp(2.75rem, 5vw, 3.75rem);
      line-height: 0.95;
      margin-left: 0.08em;
      position: relative;
      top: 0.06em;
    }

    .carousel-header__controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .carousel-header__nav {
      display: flex;
      gap: 10px;
    }

    .carousel-header__btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      padding: 0;
      cursor: pointer;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, opacity 160ms ease;
    }

    .carousel-header__btn svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .carousel-header__btn:disabled {
      background: #e4e4e8;
      border: 2px solid #d8d8dc;
      color: #b4b4bc;
      cursor: not-allowed;
    }

    .carousel-header__btn:not(:disabled) {
      background: var(--white);
      border: 2px solid var(--text-dark);
      color: var(--text-dark);
    }

    .carousel-header__btn:not(:disabled):hover {
      background: var(--text-dark);
      color: var(--white);
    }

    .carousel-header__btn:focus-visible {
      outline: 2px solid #191919;
      outline-offset: 2px;
    }

    /* —— Вьюпорт: три карточки, боковые уезжают за край —— */
    .carousel-viewport {
      overflow: hidden;
      margin: 0 -24px;
      width: calc(100% + 48px);
    }

    .carousel-track {
      display: flex;
      gap: var(--carousel-gap);
      width: max-content;
      padding: 8px 0 24px;
      will-change: transform;
      transition: transform var(--carousel-duration) var(--carousel-ease);
    }

    .carousel-track.is-instant {
      transition: none;
    }

    .carousel-slide {
      flex: 0 0 var(--carousel-card-width);
      width: var(--carousel-card-width);
      display: flex;
      align-items: stretch;
    }

    /* —— Карточка (одинаковая ширина и высота у всех) —— */
    .card {
      width: 100%;
      height: var(--card-fixed-height);
      min-height: var(--card-fixed-height);
      max-height: var(--card-fixed-height);
      display: flex;
      flex-direction: column;
      border: 3px solid #d0d0d4;
      background: var(--white);
      color: var(--text-dark);
      border-radius: var(--radius-card);
      padding: 44px 14px 14px;
      position: relative;
      overflow: hidden;
      transition:
        background-color 260ms var(--carousel-ease),
        color 260ms var(--carousel-ease),
        border-color 260ms var(--carousel-ease),
        box-shadow 260ms var(--carousel-ease);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #111215;
      transform: translateY(102%);
      transition: transform 300ms var(--carousel-ease);
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card:hover {
      color: var(--white);
      border-color: #111215;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.2);
    }

    .card:hover::before {
      transform: translateY(0);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 12px;
      flex: 0 0 auto;
      min-height: var(--card-title-block-height);
    }

    .card-title {
      margin: 0;
      font-size: clamp(20px, 2.8vw, 28px);
      line-height: 1.18;
      letter-spacing: -0.3px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      line-clamp: 4;
    }

    .card-action {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #191919;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background-color 220ms ease, color 220ms ease;
    }

    .card:hover .card-action {
      background: #ffffff;
    }

    .card-image-wrap {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      border-radius: var(--radius-image);
      overflow: hidden;
      position: relative;
      background: #e8e4f2;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 300ms var(--carousel-ease), filter 300ms var(--carousel-ease);
    }

    .card:hover .card-image {
      transform: scale(1.02);
      filter: saturate(1.02) contrast(1.03);
    }

    .icon-arrow {
      width: 14px;
      height: 14px;
      display: block;
    }

    .icon-arrow-dark {
      display: none;
    }

    .card:hover .icon-arrow-light {
      display: none;
    }

    .card:hover .icon-arrow-dark {
      display: block;
    }

    @media (max-width: 620px) {
      body {
        padding: 24px 0 32px;
      }

      :root {
        --card-fixed-height: min(620px, 118vw);
        --card-title-block-height: 6.75rem;
      }

      .carousel-section {
        padding: 0 16px;
      }

      .carousel-viewport {
        margin: 0 -16px;
        width: calc(100% + 32px);
      }

      .card {
        padding: 32px 12px 12px;
      }

      .card-title {
        -webkit-line-clamp: 3;
        line-clamp: 3;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .carousel-track {
        transition-duration: 0.01ms;
      }

    }
  </style>
</head>
<body>
  <section class="carousel-section" id="carousel" aria-labelledby="carouselHeading">
    <div class="carousel-header">
      <h1 class="section-title" id="carouselHeading">
        <strong>Бегите</strong> <span class="section-title__script">ещё быстрее</span>
      </h1>
      <div class="carousel-header__controls">
        <div class="carousel-header__nav">
          <button type="button" class="carousel-header__btn" id="prevBtn" aria-label="Предыдущая карточка">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M19 12H6" stroke-linecap="round"/>
              <path d="M13 5L5 12L13 19" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" class="carousel-header__btn" id="nextBtn" aria-label="Следующая карточка">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M5 12H18" stroke-linecap="round"/>
              <path d="M11 5L19 12L11 19" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="carousel-viewport" id="viewport">
      <div class="carousel-track" id="track" role="region" aria-roledescription="карусель" aria-label="Карточки">
        <div class="carousel-slide">
          <article class="card">
            <header class="card-header">
              <h2 class="card-title">AI-генератор: быстрое создание сайта, логотипа и изображений</h2>
              <span class="card-action" aria-hidden="true">
                <img class="icon-arrow icon-arrow-light" src="https://www.figma.com/api/mcp/asset/e7240698-e9c8-406a-936d-dc61c8ab567a" alt="">
                <img class="icon-arrow icon-arrow-dark" src="https://www.figma.com/api/mcp/asset/0be698ca-e4a6-4bb2-9fdc-c22c6e859654" alt="">
              </span>
            </header>
            <div class="card-image-wrap">
              <img class="card-image" src="https://www.figma.com/api/mcp/asset/1a6a54d1-1376-4bae-af75-f62464ea98d8" alt="">
            </div>
          </article>
        </div>
        <div class="carousel-slide">
          <article class="card">
            <header class="card-header">
              <h2 class="card-title">Точка Стор: готовая витрина товаров за 5 минут</h2>
              <span class="card-action" aria-hidden="true">
                <img class="icon-arrow icon-arrow-light" src="https://www.figma.com/api/mcp/asset/e7240698-e9c8-406a-936d-dc61c8ab567a" alt="">
                <img class="icon-arrow icon-arrow-dark" src="https://www.figma.com/api/mcp/asset/0be698ca-e4a6-4bb2-9fdc-c22c6e859654" alt="">
              </span>
            </header>
            <div class="card-image-wrap">
              <img class="card-image" src="https://picsum.photos/seed/tochka-store/960/920" alt="">
            </div>
          </article>
        </div>
        <div class="carousel-slide">
          <article class="card">
            <header class="card-header">
              <h2 class="card-title">Аналитика, биддер и репрайсер для сильных продаж на маркетплейсах</h2>
              <span class="card-action" aria-hidden="true">
                <img class="icon-arrow icon-arrow-light" src="https://www.figma.com/api/mcp/asset/e7240698-e9c8-406a-936d-dc61c8ab567a" alt="">
                <img class="icon-arrow icon-arrow-dark" src="https://www.figma.com/api/mcp/asset/0be698ca-e4a6-4bb2-9fdc-c22c6e859654" alt="">
              </span>
            </header>
            <div class="card-image-wrap">
              <img class="card-image" src="https://picsum.photos/seed/analytics/960/920" alt="">
            </div>
          </article>
        </div>
        <div class="carousel-slide">
          <article class="card">
            <header class="card-header">
              <h2 class="card-title">Платёжные сценарии и эквайринг без лишней бюрократии</h2>
              <span class="card-action" aria-hidden="true">
                <img class="icon-arrow icon-arrow-light" src="https://www.figma.com/api/mcp/asset/e7240698-e9c8-406a-936d-dc61c8ab567a" alt="">
                <img class="icon-arrow icon-arrow-dark" src="https://www.figma.com/api/mcp/asset/0be698ca-e4a6-4bb2-9fdc-c22c6e859654" alt="">
              </span>
            </header>
            <div class="card-image-wrap">
              <img class="card-image" src="https://picsum.photos/seed/payments/960/920" alt="">
            </div>
          </article>
        </div>
      </div>
    </div>
  </section>

  <script>
    (function () {
      const viewport = document.getElementById("viewport");
      const track = document.getElementById("track");
      const slides = Array.from(document.querySelectorAll(".carousel-slide"));
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      /* стартуем с первой карточки от левого края вьюпорта */
      let index = 0;
      const startOffset = 0;
      let touchStartX = null;

      function readGapPx() {
        const cs = getComputedStyle(track);
        const g = cs.gap || cs.columnGap;
        const n = parseFloat(g);
        return Number.isFinite(n) ? n : 20;
      }

      function applyTransform() {
        if (!slides.length) return;
        const gap = readGapPx();
        const step = slides[0].offsetWidth + gap;
        const translate = startOffset - index * step;
        track.style.transform = "translateX(" + translate + "px)";
      }

      function syncNavDisabled() {
        prevBtn.disabled = index <= 0;
        nextBtn.disabled = index >= slides.length - 1;
      }

      function go(delta) {
        const next = Math.max(0, Math.min(slides.length - 1, index + delta));
        if (next === index) return;
        index = next;
        applyTransform();
        syncNavDisabled();
      }

      prevBtn.addEventListener("click", function () {
        go(-1);
      });

      nextBtn.addEventListener("click", function () {
        go(1);
      });

      window.addEventListener("resize", applyTransform);

      if (typeof ResizeObserver !== "undefined") {
        const ro = new ResizeObserver(applyTransform);
        ro.observe(viewport);
        slides.forEach(function (s) {
          ro.observe(s);
        });
      }

      viewport.addEventListener(
        "touchstart",
        function (e) {
          touchStartX = e.changedTouches[0].screenX;
        },
        { passive: true }
      );

      viewport.addEventListener(
        "touchend",
        function (e) {
          if (touchStartX == null) return;
          const dx = e.changedTouches[0].screenX - touchStartX;
          touchStartX = null;
          if (Math.abs(dx) < 48) return;
          if (dx < 0) go(1);
          else go(-1);
        },
        { passive: true }
      );

      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          go(-1);
        }
        if (e.key === "ArrowRight") {
          e.preventDefault();
          go(1);
        }
      });

      applyTransform();
      syncNavDisabled();
    })();
  </script>
</body>
</html>
